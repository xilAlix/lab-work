<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление продуктами питания</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h1>Управление продуктами питания</h1>

    <!-- Форма добавления/редактирования -->
    <div class="form-card">
        <h2 id="form-title">Добавить продукт</h2>
        <input type="hidden" id="edit-id">
        <input type="text" id="title" placeholder="Название" required>
        <input type="text" id="productGroup" placeholder="Группа продуктов" required>
        <input type="text" id="packageType" placeholder="Вид упаковки">
        <button id="submit-btn">Добавить</button>
        <button id="cancel-btn" style="display:none;">Отмена</button>
    </div>

    <!-- Блок статистики -->
    <div class="stats-card">
        <h2>Статистика</h2>
        <p>Всего продуктов: <span id="total-count">0</span></p>
        <p>С указанной упаковкой: <span id="package-count">0</span></p>
    </div>

    <!--Филтры-->
    <div class="filters-card">
        <h3>Фильтры</h3>
        <label>
            Сортировка:
            <select id="filter-sort">
                <option value="">По умолчанию</option>
                <option value="id_asc">ID возр</option>
                <option value="id_desc">ID убыв</option>
                <option value="title_asc">Название А-Я</option>
                <option value="title_desc">Название Я-А</option>
            </select>
        </label>
        <label>
            Мин. ID:
            <input type="number" id="filter-min-id" min="1" placeholder="0">
        </label>
        <label>
            Группа:
            <input type="text" id="filter-group" placeholder="Например: Молочные">
        </label>
        <button id="apply-filters">Применить</button>
        <button id="reset-filters" style="background:#6c757d;">Сброс</button>
    </div>

    <!-- Таблица с данными -->
    <table id="data-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Название</th>
                <th>Группа продуктов</th>
                <th>Вид упаковки</th>
                <th>Действия</th>
            </tr>
        </thead>
        <tbody id="table-body"></tbody>
    </table>

    <div id="error-message" class="error hidden"></div>

    <script src="js/FoodProductsCRUD.js"></script>
</body>
</html>
